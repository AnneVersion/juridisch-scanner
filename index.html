<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Documentscanner — Juridisch Assistent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><text y='28' font-size='28'>&#x2696;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root {
  --bg: #0a0e1a; --bg2: #111827; --bg3: #1e293b;
  --surface: rgba(30,41,59,.65); --glass-bd: rgba(148,163,184,.15);
  --tx: #f1f5f9; --tx2: #94a3b8; --tx3: #64748b;
  --accent: #3b82f6; --accent2: #2563eb;
  --red: #ef4444; --green: #22c55e; --yellow: #eab308;
  --r: 14px; --rs: 8px;
  --font: 'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--tx); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.mi { font-family: 'Material Icons Round'; font-size: 20px; vertical-align: -4px; }

/* Layout */
.container { max-width: 600px; margin: 0 auto; padding: 16px; padding-bottom: 180px; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.header h1 { font-size: 18px; font-weight: 800; }
.header-sub { font-size: 12px; color: var(--tx3); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--tx2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.form-input { width: 100%; padding: 12px 14px; font-size: 16px; font-family: var(--font); background: var(--bg2); color: var(--tx); border: 1px solid var(--glass-bd); border-radius: var(--rs); outline: none; -webkit-appearance: none; }
.form-input:focus { border-color: var(--accent); }
select.form-input { padding-right: 32px; }

/* Server config bar */
.server-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--glass-bd); border-radius: var(--rs); }
.server-bar input { flex: 1; background: transparent; border: none; color: var(--tx); font-size: 14px; font-family: var(--font); outline: none; }
.server-bar .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.server-bar .dot-ok { background: var(--green); }
.server-bar .dot-err { background: var(--red); }
.server-bar .dot-wait { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
.server-bar button { background: var(--accent); color: #fff; border: none; padding: 6px 12px; border-radius: var(--rs); font-size: 13px; font-family: var(--font); font-weight: 600; cursor: pointer; white-space: nowrap; }

/* Thumbnail grid */
.pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 16px; min-height: 60px; }
.page-thumb { position: relative; aspect-ratio: 3/4; border-radius: var(--rs); overflow: hidden; border: 2px solid var(--glass-bd); background: var(--bg2); }
.page-thumb img { width: 100%; height: 100%; object-fit: cover; }
.page-thumb .page-num { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,.7); color: #fff; font-size: 11px; font-weight: 800; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.page-thumb .page-del { position: absolute; top: 4px; right: 4px; background: var(--red); color: #fff; border: none; font-size: 14px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'Material Icons Round'; }
.page-thumb.dragging { opacity: .4; border-color: var(--accent); }
.page-thumb.over { border-color: var(--accent); border-style: dashed; }

.empty-msg { text-align: center; padding: 40px 20px; color: var(--tx3); font-size: 14px; }
.empty-msg .mi { font-size: 48px; display: block; margin-bottom: 8px; opacity: .4; }

/* Page counter */
.pages-info { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 13px; color: var(--tx3); }

/* Bottom bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--glass-bd); padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; z-index: 100; }
.btn-row { display: flex; gap: 8px; }
.btn { flex: 1; padding: 14px; font-size: 15px; font-weight: 600; font-family: var(--font); border: none; border-radius: var(--rs); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .2s; min-height: 48px; }
.btn:active { opacity: .7; }
.btn-blue { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-ghost { background: transparent; color: var(--tx2); border: 1px solid var(--glass-bd); }
.btn:disabled { opacity: .3; pointer-events: none; }
.btn .mi { font-size: 20px; }

/* Toast */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--bg3); color: var(--tx); padding: 10px 20px; border-radius: var(--r); font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }

/* Spinner */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--glass-bd); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Status bar */
.status { text-align: center; padding: 12px; font-size: 13px; color: var(--tx3); }
.status .spinner { margin-right: 8px; vertical-align: -4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="mi" style="font-size:28px;color:var(--accent)">document_scanner</span>
    <div>
      <h1>Documentscanner</h1>
      <div class="header-sub">Juridisch Assistent</div>
    </div>
  </div>

  <!-- Server verbinding -->
  <div class="server-bar" id="serverBar">
    <span class="mi" style="font-size:16px;color:var(--tx3)">dns</span>
    <input type="text" id="serverUrl" placeholder="http://192.168.x.x:5001" spellcheck="false">
    <span class="dot dot-wait" id="serverDot"></span>
    <button onclick="connectServer()">Verbind</button>
  </div>

  <!-- Zaak selectie -->
  <div class="form-group">
    <label>Opslaan in zaak</label>
    <select class="form-input" id="zaakSelect" disabled>
      <option value="">Verbind eerst met server...</option>
    </select>
  </div>

  <!-- Bestandsnaam -->
  <div class="form-group">
    <label>Bestandsnaam</label>
    <input class="form-input" id="filename" type="text" placeholder="bijv. scan_brief_gemeente">
  </div>

  <!-- Gescande pagina's -->
  <div id="pagesContainer">
    <div class="empty-msg" id="emptyMsg">
      <span class="mi">document_scanner</span>
      Nog geen pagina's gescand.<br>Klik hieronder om te beginnen.
    </div>
    <div class="pages-grid" id="pagesGrid" style="display:none"></div>
  </div>

  <div class="pages-info" id="pagesInfo" style="display:none">
    <span id="pageCount">0 pagina's</span>
    <button style="background:none;border:none;color:var(--red);font-size:13px;font-family:var(--font);cursor:pointer" onclick="clearAll()">Alles verwijderen</button>
  </div>

  <!-- Status -->
  <div class="status" id="status" style="display:none"></div>
</div>

<!-- Camera input (hidden) -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" multiple style="display:none">
<input type="file" id="galleryInput" accept="image/*" multiple style="display:none">

<!-- Bottom bar -->
<div class="bottom-bar">
  <div class="btn-row">
    <button class="btn btn-blue" onclick="openCamera()">
      <span class="mi">photo_camera</span> Camera
    </button>
    <button class="btn btn-ghost" onclick="openGallery()">
      <span class="mi">photo_library</span> Galerij
    </button>
  </div>
  <button class="btn btn-green" id="saveBtn" onclick="saveAsPdf()" disabled>
    <span class="mi">picture_as_pdf</span> Opslaan als PDF
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var API = '';  // Wordt ingesteld via server configuratie
var pages = [];
var dragIdx = null;
var connected = false;

// ---- Toast ----
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ---- Server verbinding ----
function connectServer() {
  var input = document.getElementById('serverUrl');
  var url = input.value.trim();
  if (!url) { toast('Voer een server adres in'); return; }

  // Normaliseer URL
  if (!url.startsWith('http')) url = 'http://' + url;
  url = url.replace(/\/+$/, '');

  // Waarschuw bij mixed content (HTTPS pagina → HTTP server)
  if (location.protocol === 'https:' && url.startsWith('http://')) {
    var dot = document.getElementById('serverDot');
    dot.className = 'dot dot-err';
    toast('HTTPS pagina kan niet verbinden met HTTP server. Open de scanner via: ' + url + '/scanner');
    return;
  }

  var dot = document.getElementById('serverDot');
  dot.className = 'dot dot-wait';

  // Test verbinding
  fetch(url + '/api/health', { mode: 'cors' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      API = url + '/api';
      connected = true;
      dot.className = 'dot dot-ok';

      // Sla op in localStorage
      localStorage.setItem('ja_server_url', url);
      toast('Verbonden!');
      loadZaken();
    })
    .catch(function(e) {
      dot.className = 'dot dot-err';
      connected = false;
      toast('Kan niet verbinden — controleer IP en of de app draait');
    });
}

// ---- Laad zaken ----
function loadZaken() {
  if (!connected) return;
  var sel = document.getElementById('zaakSelect');
  sel.disabled = false;
  sel.innerHTML = '<option value="">Laden...</option>';

  fetch(API + '/zaken')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      sel.innerHTML = '<option value="">— Selecteer een zaak —</option>';
      data.forEach(function(z) {
        var opt = document.createElement('option');
        opt.value = z.id;
        opt.textContent = z.naam + (z.folder_path ? '' : ' (geen map)');
        if (!z.folder_path) opt.disabled = true;
        sel.appendChild(opt);
      });
    })
    .catch(function() {
      sel.innerHTML = '<option value="">Fout bij laden</option>';
      toast('Kon zaken niet laden');
    });
}

// ---- Camera / Galerij ----
function openCamera() {
  document.getElementById('cameraInput').click();
}

function openGallery() {
  document.getElementById('galleryInput').click();
}

document.getElementById('cameraInput').addEventListener('change', handleFiles);
document.getElementById('galleryInput').addEventListener('change', handleFiles);

function handleFiles(e) {
  var files = e.target.files;
  if (!files || !files.length) return;
  for (var i = 0; i < files.length; i++) {
    addPage(files[i]);
  }
  e.target.value = '';
}

function addPage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    pages.push({ dataUrl: e.target.result, file: file });
    renderPages();
  };
  reader.readAsDataURL(file);
}

// ---- Render pagina's ----
function renderPages() {
  var grid = document.getElementById('pagesGrid');
  var empty = document.getElementById('emptyMsg');
  var info = document.getElementById('pagesInfo');
  var saveBtn = document.getElementById('saveBtn');

  if (pages.length === 0) {
    grid.style.display = 'none';
    empty.style.display = '';
    info.style.display = 'none';
    saveBtn.disabled = true;
    return;
  }

  empty.style.display = 'none';
  grid.style.display = '';
  info.style.display = '';
  saveBtn.disabled = !connected;

  document.getElementById('pageCount').textContent = pages.length + ' pagina' + (pages.length !== 1 ? "'s" : '');

  grid.innerHTML = '';
  pages.forEach(function(p, i) {
    var div = document.createElement('div');
    div.className = 'page-thumb';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = '<img src="' + p.dataUrl + '" alt="Pagina ' + (i+1) + '">' +
      '<span class="page-num">' + (i+1) + '</span>' +
      '<button class="page-del" onclick="removePage(' + i + ')">close</button>';

    div.addEventListener('dragstart', function(e) {
      dragIdx = i;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', function() {
      div.classList.remove('dragging');
      dragIdx = null;
    });
    div.addEventListener('dragover', function(e) {
      e.preventDefault();
      div.classList.add('over');
    });
    div.addEventListener('dragleave', function() {
      div.classList.remove('over');
    });
    div.addEventListener('drop', function(e) {
      e.preventDefault();
      div.classList.remove('over');
      if (dragIdx !== null && dragIdx !== i) {
        var item = pages.splice(dragIdx, 1)[0];
        pages.splice(i, 0, item);
        renderPages();
      }
    });

    grid.appendChild(div);
  });
}

function removePage(idx) {
  pages.splice(idx, 1);
  renderPages();
}

function clearAll() {
  if (!confirm('Alle gescande pagina\'s verwijderen?')) return;
  pages = [];
  renderPages();
}

// ---- Opslaan als PDF ----
function saveAsPdf() {
  if (!connected) { toast('Verbind eerst met de server'); return; }
  var zaakId = document.getElementById('zaakSelect').value;
  if (!zaakId) { toast('Selecteer eerst een zaak'); return; }
  if (pages.length === 0) { toast('Scan eerst pagina\'s'); return; }

  var filename = document.getElementById('filename').value.trim();
  if (!filename) {
    var now = new Date();
    filename = 'scan_' + now.getFullYear() +
      ('0' + (now.getMonth()+1)).slice(-2) +
      ('0' + now.getDate()).slice(-2) + '_' +
      ('0' + now.getHours()).slice(-2) +
      ('0' + now.getMinutes()).slice(-2);
  }
  if (!filename.toLowerCase().endsWith('.pdf')) filename += '.pdf';

  var status = document.getElementById('status');
  var saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  status.style.display = '';
  status.innerHTML = '<div class="spinner"></div> PDF maken en uploaden...';

  var formData = new FormData();
  formData.append('filename', filename);
  formData.append('combine_pdf', 'true');
  pages.forEach(function(p, i) {
    formData.append('files', p.file, 'page_' + (i+1) + '.jpg');
  });

  fetch(API + '/zaken/' + zaakId + '/upload', {
    method: 'POST',
    body: formData
  })
  .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
  .then(function(res) {
    status.style.display = 'none';
    if (!res.ok) {
      toast('Fout: ' + (res.data.error || 'Upload mislukt'));
      saveBtn.disabled = false;
      return;
    }
    toast('PDF opgeslagen!');
    status.innerHTML = '<span style="color:var(--green)"><span class="mi" style="font-size:16px">check_circle</span> ' +
      res.data.filename + ' opgeslagen in zaakmap</span>';
    status.style.display = '';
    pages = [];
    renderPages();
    saveBtn.disabled = false;
  })
  .catch(function(e) {
    status.style.display = 'none';
    toast('Netwerkfout: ' + e.message);
    saveBtn.disabled = false;
  });
}

// ---- Init ----
(function() {
  // Check of we lokaal draaien (geserveerd door Flask) of extern (GitHub Pages)
  var isLocal = (location.hostname !== '' &&
    !location.hostname.endsWith('.github.io') &&
    !location.hostname.endsWith('.pages.dev'));

  if (isLocal) {
    // Lokaal: automatisch verbinden met eigen server, verberg server balk
    document.getElementById('serverBar').style.display = 'none';
    var localUrl = location.protocol + '//' + location.host;
    document.getElementById('serverUrl').value = localUrl;
    connectServer();
  } else {
    // Extern: toon server balk, herstel opgeslagen URL
    var saved = localStorage.getItem('ja_server_url');
    if (saved) {
      document.getElementById('serverUrl').value = saved;
      connectServer();
    }
  }

  // Auto bestandsnaam
  var now = new Date();
  document.getElementById('filename').value = 'scan_' + now.getFullYear() +
    ('0' + (now.getMonth()+1)).slice(-2) +
    ('0' + now.getDate()).slice(-2);
})();
</script>
</body>
</html>
